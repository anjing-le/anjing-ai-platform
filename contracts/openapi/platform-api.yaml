components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: demo-token
    apiKeyAuth:
      type: apiKey
      in: header
      name: X-API-Key
  responses:
    HealthOK:
      description: Service is healthy.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/HealthResponse"
    BadRequest:
      description: Request validation failed.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorEnvelope"
    Unauthorized:
      description: Missing or invalid credential.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorEnvelope"
    Forbidden:
      description: Credential is valid but the role is not allowed.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorEnvelope"
    NotFound:
      description: Resource not found.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorEnvelope"
  schemas:
    SuccessEnvelope:
      type: object
      required: [success]
      properties:
        success:
          type: boolean
          const: true
        data:
          description: Operation payload.
    ErrorEnvelope:
      type: object
      required: [success, error]
      properties:
        success:
          type: boolean
          const: false
        error:
          $ref: "#/components/schemas/APIError"
    APIError:
      type: object
      required: [code, message]
      properties:
        code:
          type: string
          examples: [bad_request, unauthorized, forbidden, not_found, internal_error]
        message:
          type: string
    HealthResponse:
      allOf:
        - $ref: "#/components/schemas/SuccessEnvelope"
        - type: object
          properties:
            data:
              type: object
              properties:
                service:
                  type: string
                status:
                  type: string
                time:
                  type: string
                  format: date-time
    Metric:
      type: object
      required: [label, value, note]
      properties:
        label:
          type: string
        value:
          type: string
        note:
          type: string
    User:
      type: object
      required: [id, email, org, role, mfa, status, createdAt]
      properties:
        id:
          type: string
        email:
          type: string
          format: email
        org:
          type: string
        role:
          type: string
          enum: [Administrator, User, Developer, Operator]
        mfa:
          type: string
        status:
          type: string
        createdAt:
          type: string
    CreateUserRequest:
      type: object
      required: [email]
      properties:
        email:
          type: string
          format: email
        org:
          type: string
          default: Platform
        role:
          type: string
          enum: [Administrator, User, Developer, Operator]
          default: User
    ActivateUserRequest:
      type: object
      required: [id]
      properties:
        id:
          type: string
    Application:
      type: object
      required: [id, name, owner, environment, apiKey, defaultRoute, plan, status, createdAt]
      properties:
        id:
          type: string
        name:
          type: string
        owner:
          type: string
        environment:
          type: string
          enum: [Sandbox, Production]
        apiKey:
          type: string
        defaultRoute:
          type: string
        plan:
          type: string
        status:
          type: string
        createdAt:
          type: string
    CreateApplicationRequest:
      type: object
      required: [name, owner]
      properties:
        name:
          type: string
        owner:
          type: string
          format: email
        environment:
          type: string
          enum: [Sandbox, Production]
          default: Sandbox
        defaultRoute:
          type: string
          default: /api/v1/llm/**
        plan:
          type: string
          default: Free
    ActivateApplicationRequest:
      type: object
      required: [id]
      properties:
        id:
          type: string
    RotateApplicationKeyRequest:
      type: object
      required: [id]
      properties:
        id:
          type: string
    RolePolicy:
      type: object
      required: [id, name, visibleEntries, configScope, restriction, status]
      properties:
        id:
          type: string
        name:
          type: string
        visibleEntries:
          type: string
        configScope:
          type: string
        restriction:
          type: string
        status:
          type: string
    APIKey:
      type: object
      required: [id, name, project, scope, expiresAt, status]
      properties:
        id:
          type: string
        name:
          type: string
        project:
          type: string
        scope:
          type: string
        expiresAt:
          type: string
        status:
          type: string
    RevokeAPIKeyRequest:
      type: object
      required: [id]
      properties:
        id:
          type: string
    Credential:
      type: object
      required: [id, ref, purpose, scope, expiresAt, status, maskedPreview]
      properties:
        id:
          type: string
        ref:
          type: string
        purpose:
          type: string
        scope:
          type: string
        expiresAt:
          type: string
        status:
          type: string
        maskedPreview:
          type: string
    RotateCredentialRequest:
      type: object
      required: [id]
      properties:
        id:
          type: string
    GatewayRoute:
      type: object
      required: [id, route, upstream, auth, limit, status, updatedAt]
      properties:
        id:
          type: string
        route:
          type: string
        upstream:
          type: string
        auth:
          type: string
        limit:
          type: string
        status:
          type: string
        updatedAt:
          type: string
    CreateGatewayRouteRequest:
      type: object
      required: [route]
      properties:
        route:
          type: string
          examples: [/api/v1/llm/**]
        upstream:
          type: string
          default: gateway-api
        limit:
          type: string
          default: 600/min
    PublishGatewayRouteRequest:
      type: object
      required: [id]
      properties:
        id:
          type: string
    ModelRoute:
      type: object
      required: [id, alias, scenario, primary, fallback, status, updatedAt]
      properties:
        id:
          type: string
        alias:
          type: string
        scenario:
          type: string
        primary:
          type: string
        fallback:
          type: string
        status:
          type: string
        updatedAt:
          type: string
    CreateModelRouteRequest:
      type: object
      required: [alias, primary]
      properties:
        alias:
          type: string
          examples: [chat-default]
        scenario:
          type: string
          default: General
        primary:
          type: string
          examples: [gpt-4.1-mini]
        fallback:
          type: string
          default: local-fallback
    PublishModelRouteRequest:
      type: object
      required: [id]
      properties:
        id:
          type: string
    SkillBinding:
      type: object
      required: [id, name, protocol, route, timeout, status, updatedAt]
      properties:
        id:
          type: string
        name:
          type: string
        protocol:
          type: string
        route:
          type: string
        timeout:
          type: string
        status:
          type: string
        updatedAt:
          type: string
    CreateSkillBindingRequest:
      type: object
      required: [name, route]
      properties:
        name:
          type: string
          examples: [search-knowledge]
        protocol:
          type: string
          enum: [HTTP, MCP]
          default: HTTP
        route:
          type: string
          examples: [/api/v1/skills/search]
        timeout:
          type: string
          default: 8s
    PublishSkillBindingRequest:
      type: object
      required: [id]
      properties:
        id:
          type: string
    RequestLog:
      type: object
      required: [id, request, consumer, latency, result, status, createdAt]
      properties:
        id:
          type: string
        request:
          type: string
        consumer:
          type: string
        latency:
          type: string
        result:
          type: string
        status:
          type: string
        createdAt:
          type: string
    LLMInvokeRequest:
      type: object
      required: [input]
      properties:
        modelAlias:
          type: string
          default: chat-default
        input:
          type: string
        temperature:
          type: number
          format: double
          default: 0
    LLMUsage:
      type: object
      required: [inputTokens, outputTokens, totalTokens]
      properties:
        inputTokens:
          type: integer
          minimum: 0
        outputTokens:
          type: integer
          minimum: 0
        totalTokens:
          type: integer
          minimum: 0
    LLMInvokeResponse:
      type: object
      required:
        - id
        - modelAlias
        - provider
        - model
        - fallback
        - content
        - finishReason
        - usage
      properties:
        id:
          type: string
        modelAlias:
          type: string
        provider:
          type: string
        model:
          type: string
        fallback:
          type: string
        content:
          type: string
        finishReason:
          type: string
        usage:
          $ref: "#/components/schemas/LLMUsage"
    BillingPlan:
      type: object
      required: [id, name, target, rps, tokenPerDay, status]
      properties:
        id:
          type: string
        name:
          type: string
        target:
          type: string
        rps:
          type: string
        tokenPerDay:
          type: string
        status:
          type: string
    CreateBillingPlanRequest:
      type: object
      required: [name]
      properties:
        name:
          type: string
        rps:
          type: string
          default: "100"
        tokenPerDay:
          type: string
          default: 1M
    ActivateBillingPlanRequest:
      type: object
      required: [id]
      properties:
        id:
          type: string
    UsageRecord:
      type: object
      required: [id, project, tokens, skillCalls, cost, status, updatedAt]
      properties:
        id:
          type: string
        project:
          type: string
        tokens:
          type: string
        skillCalls:
          type: string
        cost:
          type: string
        status:
          type: string
        updatedAt:
          type: string
    BudgetAlert:
      type: object
      required: [id, project, budget, current, threshold, status]
      properties:
        id:
          type: string
        project:
          type: string
        budget:
          type: string
        current:
          type: string
        threshold:
          type: string
        status:
          type: string
    ResolveBudgetAlertRequest:
      type: object
      required: [id]
      properties:
        id:
          type: string
    OpsDashboard:
      type: object
      required: [metrics, todos, health, audit]
      properties:
        metrics:
          type: array
          items:
            $ref: "#/components/schemas/Metric"
        todos:
          type: array
          items:
            $ref: "#/components/schemas/OpsTodo"
        health:
          type: array
          items:
            $ref: "#/components/schemas/ServiceHealth"
        audit:
          type: array
          items:
            $ref: "#/components/schemas/AuditEvent"
    PlatformSnapshot:
      type: object
      required:
        - dashboard
        - users
        - applications
        - roles
        - apiKeys
        - credentials
        - routes
        - modelRoutes
        - skills
        - requestLogs
        - plans
        - usage
        - budgetAlerts
      properties:
        dashboard:
          $ref: "#/components/schemas/OpsDashboard"
        users:
          type: array
          items:
            $ref: "#/components/schemas/User"
        applications:
          type: array
          items:
            $ref: "#/components/schemas/Application"
        roles:
          type: array
          items:
            $ref: "#/components/schemas/RolePolicy"
        apiKeys:
          type: array
          items:
            $ref: "#/components/schemas/APIKey"
        credentials:
          type: array
          items:
            $ref: "#/components/schemas/Credential"
        routes:
          type: array
          items:
            $ref: "#/components/schemas/GatewayRoute"
        modelRoutes:
          type: array
          items:
            $ref: "#/components/schemas/ModelRoute"
        skills:
          type: array
          items:
            $ref: "#/components/schemas/SkillBinding"
        requestLogs:
          type: array
          items:
            $ref: "#/components/schemas/RequestLog"
        plans:
          type: array
          items:
            $ref: "#/components/schemas/BillingPlan"
        usage:
          type: array
          items:
            $ref: "#/components/schemas/UsageRecord"
        budgetAlerts:
          type: array
          items:
            $ref: "#/components/schemas/BudgetAlert"
    OpsTodo:
      type: object
      required: [id, title, source, owner, status, updatedAt]
      properties:
        id:
          type: string
        title:
          type: string
        source:
          type: string
        owner:
          type: string
        status:
          type: string
        updatedAt:
          type: string
    ResolveTodoRequest:
      type: object
      required: [id]
      properties:
        id:
          type: string
    ServiceHealth:
      type: object
      required: [id, name, slo, p95, status]
      properties:
        id:
          type: string
        name:
          type: string
        slo:
          type: string
        p95:
          type: string
        status:
          type: string
    AuditEvent:
      type: object
      required: [id, time, module, action, object, status, requestId]
      properties:
        id:
          type: string
        time:
          type: string
        module:
          type: string
        action:
          type: string
        object:
          type: string
        status:
          type: string
        requestId:
          type: string
