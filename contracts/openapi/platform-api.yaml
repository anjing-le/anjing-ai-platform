openapi: 3.1.0
info:
  title: Anjing AI Platform API
  version: 0.1.0
  summary: V1 control, gateway, billing and operations API contract.
  description: >
    Anjing AI Platform V1 keeps a modular Go service boundary while allowing
    local development through the platform-all command. Business APIs return a
    unified envelope and can be protected by Bearer token or X-API-Key when
    ANJING_AUTH_MODE=enforced. The x-anjing-service-boundaries extension is the
    contract between console entries, owner commands and API groups; it is
    verified against the frontend consoleServiceMap during pnpm verify.
servers:
  - url: http://localhost:18080
    description: platform-all local server
  - url: http://localhost:1820
    description: control-api local server
  - url: http://localhost:1821
    description: gateway-api local server
  - url: http://localhost:1822
    description: billing-service local server
  - url: http://localhost:1823
    description: ops-api local server
security:
  - bearerAuth: []
  - apiKeyAuth: []
tags:
  - name: platform
    description: Shared runtime health.
  - name: control
    description: Applications, users, role policies, API keys and credential references.
  - name: gateway
    description: API routes, model routes, skill bindings and request logs.
  - name: billing
    description: Plans, usage records and budget alerts.
  - name: operations
    description: Dashboard, todos, service health and audit events.
x-anjing-service-boundaries:
  - consoleEntry: operations
    label: 运营总览
    owner: ops-api
    apiGroups:
      - /api/ops/platform-snapshot
      - /api/ops/dashboard
      - /api/ops/todos
      - /api/ops/audit-events
  - consoleEntry: access
    label: 用户与权限
    owner: control-api
    apiGroups:
      - /api/control/users
      - /api/control/applications
      - /api/control/api-keys
  - consoleEntry: gateway
    label: 网关与模型
    owner: gateway-api
    apiGroups:
      - /api/gateway/routes
      - /api/gateway/model-routes
      - /api/gateway/llm/invoke
  - consoleEntry: billing
    label: 计费与配额
    owner: billing-service
    apiGroups:
      - /api/billing/plans
      - /api/billing/usage
      - /api/billing/budget-alerts
  - consoleEntry: docs
    label: 帮助文档
    owner: console-web + APIs
    apiGroups:
      - /
      - /api/*
paths:
  /healthz:
    get:
      tags: [platform]
      operationId: getPlatformHealth
      summary: Platform health check.
      security: []
      responses:
        "200":
          description: Service is healthy.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthResponse"
  /api/control/healthz:
    get:
      tags: [control]
      operationId: getControlHealth
      summary: Control API health check.
      security: []
      responses:
        "200":
          $ref: "#/components/responses/HealthOK"
  /api/control/users:
    get:
      tags: [control]
      operationId: listUsers
      summary: List console users.
      x-anjing-roles: [Administrator]
      responses:
        "200":
          description: Users returned.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/SuccessEnvelope"
                  - type: object
                    properties:
                      data:
                        type: array
                        items:
                          $ref: "#/components/schemas/User"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
    post:
      tags: [control]
      operationId: createUser
      summary: Invite a new console user.
      x-anjing-roles: [Administrator]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateUserRequest"
      responses:
        "201":
